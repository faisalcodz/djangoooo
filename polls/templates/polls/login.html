{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'polls/auth.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Sign In</h1>
        </div>

        {% if messages %}
        <div class="auth-messages">
            {% for message in messages %}
            <div class="auth-message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{{ request.path }}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'polls:signup' %}">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
